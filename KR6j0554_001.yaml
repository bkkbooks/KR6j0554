body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑑正號大廣智大興善寺三藏沙門不空奉詔譯如是我聞一時薄伽梵住室羅伐城逝多林給孤長者園與大苾芻衆千二百五十人俱衆多諸大菩薩摩訶薩爾時世尊告阿難陀言阿難陀有陀羅尼能除世間一切疾病汝當受持讀誦通利如理作意即説密言曰怛儞也二合他一尾摩黎尾摩黎二嚩曩俱枳黎三室唎二合末底丁以反四軍拏黎五嫩奴鼻六印捺囉二合擬𩕳二合七母隸娑嚩二合訶佛告阿難陀此陀羅尼若誦持者宿食不消癨亂風黃痰癊患痔瘻淋上氣嗽虐寒熱頭痛半痛著鬼魅者悉得除差我以佛眼觀見彼人諸天魔梵沙門婆羅門能作障難除非決定業報盡者餘無能違越作其障難如來應供正遍知説一切有情中如來為尊勝一切法中離欲法尊一切衆中僧伽為尊以此誠實言願我及一切有情食飲喫啖入腹消化得正安樂娑嚩二合引訶引爾時世尊説是經已諸苾芻僧并諸菩薩摩訶薩一切大衆天龍八部受持佛語歡喜奉行
